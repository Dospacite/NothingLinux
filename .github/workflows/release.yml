name: Linux packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to publish; leave empty for artifacts only
        required: false
        type: string
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: linux-packages-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: Package Linux x86_64
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Install native and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libdbus-1-dev \
            libbluetooth-dev \
            desktop-file-utils \
            appstream \
            libgirepository1.0-dev \
            librsvg2-dev \
            patchelf \
            ruby-dev \
            rpm \
            file
          sudo gem install fpm --version 1.15.1 --no-document

      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "nothing-linux") | .version')"
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "Could not resolve the application version" >&2
            exit 1
          fi
          release_tag="${{ inputs.release_tag }}"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
          fi
          if [[ -n "$release_tag" && "$release_tag" != "v$version" ]]; then
            echo "Tag $release_tag does not match Cargo version $version" >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --locked --release -p nothing-linux

      - name: Build DEB, RPM, and AppImage
        run: packaging/build-linux-packages.sh "${{ steps.version.outputs.version }}"

      - name: Inspect packages
        shell: bash
        run: |
          dpkg-deb --info dist/*.deb
          rpm -qip dist/*.rpm
          file dist/*.AppImage
          test -x dist/*.AppImage

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nothing-linux-${{ steps.version.outputs.version }}-linux-x86_64
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: needs.package.outputs.release_tag != ''
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          name: nothing-linux-${{ needs.package.outputs.version }}-linux-x86_64
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.package.outputs.release_tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "Nothing Linux $RELEASE_TAG"
          fi
