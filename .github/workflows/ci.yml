name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: rustfmt, clippy
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libdbus-1-dev \
            libbluetooth-dev \
            desktop-file-utils \
            appstream
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Desktop metadata
        run: desktop-file-validate data/io.github.nothinglinux.nothinglinux.desktop
      - name: AppStream metadata
        run: appstreamcli validate --pedantic data/io.github.nothinglinux.nothinglinux.metainfo.xml
